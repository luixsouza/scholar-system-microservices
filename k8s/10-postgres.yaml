apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: escolar
type: Opaque
stringData:
  POSTGRES_USER: escolar
  POSTGRES_PASSWORD: escolar
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: escolar
data:
  init.sql: |
    CREATE DATABASE aluno_db;
    CREATE DATABASE professor_db;
    CREATE DATABASE disciplina_db;
    CREATE DATABASE matricula_db;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: escolar
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: escolar
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "escolar"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
