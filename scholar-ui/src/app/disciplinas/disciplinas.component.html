<div class="page-header">
  <h2>Disciplinas</h2>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Nova
  </button>
</div>

@if (disciplinas().length) {
  <table mat-table [dataSource]="disciplinas()">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let d">{{ d.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="cargaHoraria">
      <th mat-header-cell *matHeaderCellDef>Carga Horaria</th>
      <td mat-cell *matCellDef="let d">{{ d.cargaHoraria }}h</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let d">
        <button mat-icon-button (click)="abrir(d)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="excluir(d)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
} @else {
  <div class="empty">
    <mat-icon>menu_book</mat-icon>
    <p>Nenhuma disciplina cadastrada</p>
  </div>
}
