<div class="header">
  <h2>Disciplinas</h2>
  <button mat-raised-button color="primary" (click)="abrir()">
    <mat-icon>add</mat-icon> Nova Disciplina
  </button>
</div>

<table mat-table [dataSource]="disciplinas">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let d">{{ d.id }}</td>
  </ng-container>

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let d">{{ d.nome }}</td>
  </ng-container>

  <ng-container matColumnDef="cargaHoraria">
    <th mat-header-cell *matHeaderCellDef>Carga Horaria</th>
    <td mat-cell *matCellDef="let d">{{ d.cargaHoraria }}h</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Acoes</th>
    <td mat-cell *matCellDef="let d">
      <button mat-icon-button color="primary" (click)="abrir(d)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="excluir(d.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
