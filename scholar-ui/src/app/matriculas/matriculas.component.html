<div class="page-header">
  <h2>Matriculas</h2>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Nova
  </button>
</div>

@if (matriculas().length) {
  <table mat-table [dataSource]="matriculas()">
    <ng-container matColumnDef="alunoNome">
      <th mat-header-cell *matHeaderCellDef>Aluno</th>
      <td mat-cell *matCellDef="let m">{{ m.alunoNome }}</td>
    </ng-container>

    <ng-container matColumnDef="disciplinaNome">
      <th mat-header-cell *matHeaderCellDef>Disciplina</th>
      <td mat-cell *matCellDef="let m">{{ m.disciplinaNome }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let m">
        <button mat-icon-button color="warn" (click)="excluir(m)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
} @else {
  <div class="empty">
    <mat-icon>assignment</mat-icon>
    <p>Nenhuma matricula realizada</p>
  </div>
}
