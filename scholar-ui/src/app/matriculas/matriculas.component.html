<div class="header">
  <h2>Matriculas</h2>
  <button mat-raised-button color="primary" (click)="abrir()">
    <mat-icon>add</mat-icon> Nova Matricula
  </button>
</div>

<table mat-table [dataSource]="matriculas">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let m">{{ m.id }}</td>
  </ng-container>

  <ng-container matColumnDef="alunoId">
    <th mat-header-cell *matHeaderCellDef>Aluno ID</th>
    <td mat-cell *matCellDef="let m">{{ m.alunoId }}</td>
  </ng-container>

  <ng-container matColumnDef="disciplinaId">
    <th mat-header-cell *matHeaderCellDef>Disciplina ID</th>
    <td mat-cell *matCellDef="let m">{{ m.disciplinaId }}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef>Acoes</th>
    <td mat-cell *matCellDef="let m">
      <button mat-icon-button color="warn" (click)="excluir(m.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
