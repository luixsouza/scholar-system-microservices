<div class="page-header">
  <h2>Alunos</h2>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Novo
  </button>
</div>

@if (alunos().length) {
  <table mat-table [dataSource]="alunos()">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let a">{{ a.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let a">{{ a.email }}</td>
    </ng-container>

    <ng-container matColumnDef="matricula">
      <th mat-header-cell *matHeaderCellDef>Matricula</th>
      <td mat-cell *matCellDef="let a">{{ a.matricula }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let a">
        <button mat-icon-button (click)="abrir(a)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="excluir(a)"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>
} @else {
  <div class="empty">
    <mat-icon>school</mat-icon>
    <p>Nenhum aluno cadastrado</p>
  </div>
}
